<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>CALCULATOR</h1>
        <script>
            var num1=Number(prompt("Enter num1:"))
            var num2=Number(prompt("Enter num2:"))

            var ch=Number(prompt("Enter choice:\n"+
                "1.Addition\n"+
                "2.Subtraction\n"+
                "3.Multiplication\n"+
                "4.division\n"+
                "5.Mod"
            ));

            switch(ch){
                case 1:{
                    Add=num1+num2;
                    document.write("Addition: "+ Add);
                }break;
                case 2:{
                    Sub = num1-num2;
                    document.write("Subtraction: "+Sub);
                }break;
                case 3:{
                    Mul=num1*num2;
                    document.write("Multiplication: "+Mul);
                }break;
                case 4:{
                    div=num1/num2;
                    document.write("Division : "+div)
                }break;
                case 5:{
                    mod=num1%num2;
                    document.write("Mod : "+mod);
                }break;
                default:
                    alert("It is wrong choice")
            }
        </script>
</body>
</html>
