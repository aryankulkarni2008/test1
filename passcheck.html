<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h>Password Check</h>
    <script>
        var pass=prompt("Enter Paaword :");
        console.log(pass.length >=8
            && /[A-Z]/.test(pass)
            &&/[0-9]/.test(pass)
            &&/[#@$!%]/.test(pass)?
            "valid password": "Invalid password"
        );
        
    </script>
</body>
</html>
