<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Check whether number is divisible by 5 or not </h1>
        <script>
            var num=Number(prompt("enter number to check divisible by 5 or not:"));
            if(num%5==0){
                document.write("Number is divisible by 5");
            }
            else{
                document.write("number is not divisible by 5");
            }
        </script>
</body>
</html>
