<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>HEllO</h1>
    <script>
        var name = prompt("Enter your name");
        var time=Number(prompt("Enter time:"));

        if(time>=5 && time<12){
            document.write("Hello"+name)
        }
        else if(time>12 && time<17){
            document.write("hello" + name)
        }
        else {
            document.write("hello"+ name)
        }
    </script>
</body>
</html>
