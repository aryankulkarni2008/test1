<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Check whether it is leap year or not</h1>
        <script>
            var year=Number(prompt("Enter year"));
                if(year%2==0){
                    document.write(year+"<br>year,is leap year")
                }
                else{
                    document.write("<br>it is not leap year it is normal year"+year);
                }
        </script>
</body>
</html>
