<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Billing</h1>
    <script>
        let amount=Number(prompt("enter total amount :"))
        let discount = 0;

        if(amount>5000){
            discount = amount*0.20;
            console.log(amount-discount ,"you got discount :",discount);
        }
        else if(amount>3000){
            discount = amount*0.10;
            console.log(amount-discount ,"You got discount : ",discount);
        }
        else if(amount>1000){
            discount = amount*0.5;
            console.log(amount-discount ,"you got discount : ",discount);
        }
        else{
            console.log(amount);
        }
    </script>
</body>
</html>
